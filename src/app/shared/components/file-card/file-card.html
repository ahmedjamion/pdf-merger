<div class="bg-surface rounded-xl overflow-clip">
  <!-- Preview Area -->
  <div class="min-w-3xs aspect-square flex items-center justify-center">
    @if (isPdf) {
      @if (previewUrl(); as url) {
        <img
          [src]="url"
          [alt]="file().name + ' preview'"
          class="h-full w-full object-cover object-top"
        />
      } @else {
        <p>Loading preview...</p>
      }
    } @else {
      <img
        [src]="file().previewUrl"
        [alt]="file().name + ' preview'"
        class="h-full w-full object-contain"
      />
    }
  </div>

  <!-- File Info -->
  <div class="flex items-center max-w-3xs p-2 gap-2">
    <div class="flex flex-col grow min-w-0">
      <p class="truncate" [title]="file().name">
        {{ file().name }}
      </p>
      <p class="">
        <ng-icon [name]="isPdf ? 'lucideFileText' : 'lucideImage'" size="12" />
        <span>{{ file().pageCount }} page{{ file().pageCount !== 1 ? 's' : '' }}</span>
        <span class="">•</span>
        <span>{{ (file().size / 1024 / 1024).toFixed(1) }} MB</span>
      </p>
    </div>

    <!-- Remove Button -->
    <button
      type="button"
      class="cursor-pointer p-2 bg-primary text-on-primary rounded-lg flex items-center justify-center"
      [disabled]="disabled()"
      [class.opacity-50]="disabled()"
      [class.cursor-not-allowed]="disabled()"
      [attr.aria-label]="'Remove ' + file().name"
      (click)="onRemove()"
    >
      <ng-icon name="lucideTrash2" size="20" />
    </button>
  </div>
</div>
