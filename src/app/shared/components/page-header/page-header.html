<div class="flex flex-col items-start">
  <div class="flex gap-2 items-center justify-center">
    @if (previousPage()) {
      <a [routerLink]="previousPage()">
        <ng-icon name="lucideChevronLeft" size="24" />
      </a>
    }
    <span class="px-3 py-1 bg-primary text-on-primary rounded-full">
      Step {{ step() }} of {{ totalSteps() }}
    </span>
  </div>
  <h1 class="text-2xl font-bold text-on-background">
    {{ title() }}
  </h1>
  @if (description()) {
    <p class="max-w-md">
      {{ description() }}
    </p>
  }
</div>
